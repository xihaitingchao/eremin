<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>琳敏消消乐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  font-family:system-ui,sans-serif;color:#fff;touch-action:none;
  -webkit-tap-highlight-color:transparent;overflow:hidden;
}
#top-bar{
  display:flex;justify-content:space-between;align-items:center;
  width:100%;max-width:420px;padding:8px 4px;
}
#top-bar .info{font-size:1.15em}
#top-bar .info span{color:#f7d354;font-weight:bold}
canvas{border-radius:12px;box-shadow:0 0 40px rgba(0,0,0,.5);background:#0a0a2e}
#combo{
  position:fixed;top:45%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-size:2.2em;font-weight:bold;color:#f7d354;pointer-events:none;
  text-shadow:0 0 20px rgba(247,211,84,.6);z-index:50;
  transition:transform .2s,opacity .3s;opacity:0;
}
#combo.show{transform:translate(-50%,-50%) scale(1);opacity:1}
.particle{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:60}
.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.75);display:none;align-items:center;
  justify-content:center;z-index:100;
}
.modal.show{display:flex}
.modal-box{
  background:linear-gradient(135deg,#1e1e3f,#2a1a4e);border-radius:20px;
  padding:32px 28px;text-align:center;max-width:320px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.modal-box h3{font-size:1.3em;margin-bottom:10px}
.final-score{font-size:2.8em;color:#f7d354;font-weight:bold;margin:10px 0}
.modal-box .sub{color:rgba(255,255,255,.5);font-size:.9em;margin-bottom:16px}
.modal-box button{
  padding:12px 28px;border:none;border-radius:12px;font-size:1.05em;
  cursor:pointer;background:#f7d354;color:#1a1a2e;font-weight:bold;
}
.modal-box button:active{transform:scale(.96)}
#loading{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#0f0c29;display:flex;align-items:center;justify-content:center;
  font-size:1.2em;z-index:200;
}
</style>
</head>
<body>

<div id="loading">加载中...</div>

<div id="top-bar">
  <div class="info">⭐ <span id="score">0</span></div>
  <div class="info">步数 <span id="moves">30</span></div>
</div>
<canvas id="game"></canvas>
<div id="combo"></div>

<div class="modal" id="end-modal">
  <div class="modal-box">
    <h3 id="end-title">🎉 游戏结束</h3>
    <div class="final-score" id="final-score">0</div>
    <div class="sub" id="end-sub"></div>
    <button onclick="restartGame()">再来一局</button>
  </div>
</div>

/* 如果没有内置图片，自动用 Emoji 生成 */
const EMOJI_FALLBACK = ['🍎','🍊','🍇','🌟','💎'];
const BG_COLORS = ['#e74c3c88','#3498db88','#2ecc7188','#f39c1288','#9b59b688'];

const TOTAL = 5, COLS = 7, ROWS = 9, MATCH_N = 3;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const movesEl = document.getElementById('moves');
const comboEl = document.getElementById('combo');

let cellSize, board, score, moves, selected, animating;
let comboCount, comboTimer;
let imageObjects = [];

/* ============ 加载图案 ============ */
function loadImages() {
  return new Promise(resolve => {
    if (IMAGES.length === TOTAL) {
      let loaded = 0;
      IMAGES.forEach((src, i) => {
        const img = new Image();
        img.onload = img.onerror = () => { loaded++; if (loaded === TOTAL) resolve(); };
        img.src = src;
        imageObjects[i] = img;
      });
    } else {
      // Emoji 回退
      EMOJI_FALLBACK.forEach((emoji, i) => {
        const cvs = document.createElement('canvas');
        cvs.width = 128; cvs.height = 128;
        const c = cvs.getContext('2d');
        c.fillStyle = BG_COLORS[i];
        c.beginPath(); c.roundRect(0,0,128,128,20); c.fill();
        c.font = '80px serif';
        c.textAlign = 'center'; c.textBaseline = 'middle';
        c.fillText(emoji, 64, 68);
        const img = new Image();
        img.src = cvs.toDataURL();
        imageObjects[i] = img;
      });
      setTimeout(resolve, 50);
    }
  });
}

/* ============ 初始化 ============ */
function resize() {
  const maxW = Math.min(window.innerWidth * 0.95, 420);
  const maxH = window.innerHeight - 80;
  cellSize = Math.floor(Math.min(maxW / COLS, maxH / ROWS));
  canvas.width = cellSize * COLS;
  canvas.height = cellSize * ROWS;
}

function initGame() {
  score = 0; moves = 30; selected = null;
  animating = false; comboCount = 0;
  scoreEl.textContent = score;
  movesEl.textContent = moves;
  document.getElementById('end-modal').classList.remove('show');

  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      board[r][c] = { type: rndType(r, c), scale: 1, alpha: 1 };
    }
  }
  drawBoard();
}

function rndType(r, c) {
  let t;
  do {
    t = Math.floor(Math.random() * TOTAL);
  } while (
    (c >= 2 && board[r][c-1]?.type === t && board[r][c-2]?.type === t) ||
    (r >= 2 && board[r-1]?.[c]?.type === t && board[r-2]?.[c]?.type === t)
  );
  return t;
}

/* ============ 渲染 ============ */
function drawBoard() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * cellSize, y = r * cellSize;
      ctx.fillStyle = (r + c) % 2 === 0 ? 'rgba(255,255,255,.05)' : 'rgba(255,255,255,.025)';
      rrect(ctx, x+1, y+1, cellSize-2, cellSize-2, 4); ctx.fill();

      const cell = board[r][c];
      if (!cell || cell.type === null) continue;

      if (selected && selected.r === r && selected.c === c) {
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,.18)';
        rrect(ctx, x+2, y+2, cellSize-4, cellSize-4, 6); ctx.fill();
        ctx.strokeStyle = '#f7d354'; ctx.lineWidth = 2.5;
        rrect(ctx, x+2, y+2, cellSize-4, cellSize-4, 6); ctx.stroke();
        ctx.restore();
      }

      const img = imageObjects[cell.type];
      if (img && img.complete) {
        const pad = 4;
        const s = (cellSize - pad*2) * cell.scale;
        const ox = x + pad + (cellSize - pad*2 - s) / 2;
        const oy = y + pad + (cellSize - pad*2 - s) / 2;
        ctx.globalAlpha = cell.alpha;
        ctx.save();
        ctx.beginPath();
        rrect(ctx, ox, oy, s, s, s * 0.12);
        ctx.clip();
        ctx.drawImage(img, ox, oy, s, s);
        ctx.restore();
        ctx.globalAlpha = 1;
      }
    }
  }
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ============ 交互 ============ */
function getCell(px, py) {
  const rect = canvas.getBoundingClientRect();
  const c = Math.floor((px - rect.left) / cellSize);
  const r = Math.floor((py - rect.top) / cellSize);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  return { r, c };
}
function isAdj(a, b) { return Math.abs(a.r-b.r) + Math.abs(a.c-b.c) === 1; }

let touchStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStart = { x:t.clientX, y:t.clientY, cell:getCell(t.clientX, t.clientY) };
}, { passive:false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!touchStart?.cell) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x, dy = t.clientY - touchStart.y;
  if (Math.sqrt(dx*dx+dy*dy) < 10) handleTap(touchStart.cell);
  else handleSwipe(touchStart.cell, dx, dy);
  touchStart = null;
}, { passive:false });

canvas.addEventListener('click', e => {
  const cell = getCell(e.clientX, e.clientY);
  if (cell) handleTap(cell);
});

function handleTap(cell) {
  if (animating) return;
  if (!selected) { selected = cell; drawBoard(); return; }
  if (selected.r === cell.r && selected.c === cell.c) { selected = null; drawBoard(); return; }
  if (isAdj(selected, cell)) trySwap(selected, cell);
  else selected = cell;
  drawBoard();
}

function handleSwipe(cell, dx, dy) {
  if (animating) return;
  let t;
  if (Math.abs(dx) > Math.abs(dy)) t = { r:cell.r, c:cell.c+(dx>0?1:-1) };
  else t = { r:cell.r+(dy>0?1:-1), c:cell.c };
  if (t.r<0||t.r>=ROWS||t.c<0||t.c>=COLS) return;
  selected = null;
  trySwap(cell, t);
  drawBoard();
}

/* ============ 游戏逻辑 ============ */
function trySwap(a, b) {
  swap(a, b);
  const matches = findMatches();
  if (matches.length > 0) {
    moves--; movesEl.textContent = moves;
    animating = true; comboCount = 0;
    processMatches(matches);
  } else {
    swap(a, b);
    flashInvalid(a, b);
  }
  selected = null;
}

function swap(a, b) {
  const tmp = board[a.r][a.c];
  board[a.r][a.c] = board[b.r][b.c];
  board[b.r][b.c] = tmp;
}

function findMatches() {
  const matched = new Set();
  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      const t = board[r][c]?.type;
      if (t == null) { c++; continue; }
      let len = 1;
      while (c+len < COLS && board[r][c+len]?.type === t) len++;
      if (len >= MATCH_N) for (let i = 0; i < len; i++) matched.add(`${r},${c+i}`);
      c += len;
    }
  }
  for (let c = 0; c < COLS; c++) {
    let r = 0;
    while (r < ROWS) {
      const t = board[r][c]?.type;
      if (t == null) { r++; continue; }
      let len = 1;
      while (r+len < ROWS && board[r+len][c]?.type === t) len++;
      if (len >= MATCH_N) for (let i = 0; i < len; i++) matched.add(`${r+i},${c}`);
      r += len;
    }
  }
  return [...matched].map(s => { const [r,c] = s.split(',').map(Number); return {r,c}; });
}

function processMatches(matches) {
  comboCount++;
  score += matches.length * 10 * comboCount;
  scoreEl.textContent = score;
  if (comboCount >= 2) showCombo(comboCount);
  matches.forEach(m => spawnParticles(
    m.c * cellSize + cellSize/2,
    m.r * cellSize + cellSize/2
  ));

  animateRemove(matches, () => {
    matches.forEach(m => board[m.r][m.c] = null);
    drawBoard();
    setTimeout(() => {
      dropDown(); fillEmpty(); drawBoard();
      setTimeout(() => {
        const next = findMatches();
        if (next.length > 0) processMatches(next);
        else {
          animating = false; comboCount = 0;
          if (moves <= 0) setTimeout(endGame, 300);
          else if (!hasPossibleMove()) { shuffleBoard(); drawBoard(); }
        }
      }, 80);
    }, 120);
  });
}

function animateRemove(cells, cb) {
  let f = 0; const total = 8;
  (function step() {
    f++;
    const t = f / total;
    cells.forEach(m => {
      if (board[m.r][m.c]) {
        board[m.r][m.c].scale = 1 - t * .5;
        board[m.r][m.c].alpha = 1 - t;
      }
    });
    drawBoard();
    if (f < total) requestAnimationFrame(step); else cb();
  })();
}

function flashInvalid(a, b) {
  [a,b].forEach(p => {
    const x = p.c*cellSize, y = p.r*cellSize;
    ctx.fillStyle = 'rgba(231,76,60,.3)';
    rrect(ctx, x+2, y+2, cellSize-4, cellSize-4, 6); ctx.fill();
  });
  setTimeout(drawBoard, 200);
}

function dropDown() {
  for (let c = 0; c < COLS; c++) {
    let w = ROWS - 1;
    for (let r = ROWS-1; r >= 0; r--) {
      if (board[r][c]) { board[w][c] = board[r][c]; if (w!==r) board[r][c]=null; w--; }
    }
    for (let r = w; r >= 0; r--) board[r][c] = null;
  }
}

function fillEmpty() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (!board[r][c])
        board[r][c] = { type: Math.floor(Math.random()*TOTAL), scale:1, alpha:1 };
}

function hasPossibleMove() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c+1<COLS) {
        swap({r,c},{r,c:c+1});
        if (findMatches().length) { swap({r,c},{r,c:c+1}); return true; }
        swap({r,c},{r,c:c+1});
      }
      if (r+1<ROWS) {
        swap({r,c},{r:r+1,c});
        if (findMatches().length) { swap({r,c},{r:r+1,c}); return true; }
        swap({r,c},{r:r+1,c});
      }
    }
  }
  return false;
}

function shuffleBoard() {
  const types = [];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) types.push(board[r][c].type);
  for (let i=types.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [types[i],types[j]]=[types[j],types[i]]; }
  let idx=0;
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) board[r][c]={type:types[idx++],scale:1,alpha:1};
  let m=findMatches();
  while(m.length){m.forEach(({r,c})=>board[r][c].type=Math.floor(Math.random()*TOTAL));m=findMatches();}
}

/* ============ 特效 ============ */
function showCombo(n) {
  comboEl.textContent = `${n} 连击! 🔥`;
  comboEl.classList.add('show');
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => comboEl.classList.remove('show'), 800);
}

function spawnParticles(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  const colors = ['#f7d354','#e74c3c','#3498db','#2ecc71','#f39c12','#fff'];
  for (let i=0;i<6;i++) {
    const p = document.createElement('div');
    p.className='particle';
    p.style.left=(rect.left+cx)+'px';
    p.style.top=(rect.top+cy)+'px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(p);
    const a=Math.random()*Math.PI*2, d=30+Math.random()*50;
    p.animate([
      {transform:'translate(0,0) scale(1)',opacity:1},
      {transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(0)`,opacity:0}
    ],{duration:400+Math.random()*200,easing:'ease-out'});
    setTimeout(()=>p.remove(),600);
  }
}

function endGame() {
  document.getElementById('final-score').textContent = score;
  const title = document.getElementById('end-title');
  const sub = document.getElementById('end-sub');
  if (score>=2000){title.textContent='🏆 地狱再会';sub.textContent='琳敏磕学家';}
  else if(score>=1000){title.textContent='🎉 很棒!';sub.textContent='继续加油！';}
  else{title.textContent='😊 游戏结束';sub.textContent='地狱再会';}
  document.getElementById('end-modal').classList.add('show');
}

function restartGame() {
  document.getElementById('end-modal').classList.remove('show');
  initGame();
}

window.addEventListener('resize', () => { resize(); drawBoard(); });

/* ============ 启动 ============ */
(async () => {
  resize();
  await loadImages();
  document.getElementById('loading').style.display = 'none';
  initGame();
})();
</script>
